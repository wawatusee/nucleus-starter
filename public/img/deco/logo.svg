<svg viewBox="0 0 220 50" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="path1" d="M 50,0 55,50 100,50 Z"/>
  </defs>
  <g id="logo">
    <use xlink:href="#path1" transform="translate(-45,0)"
         style="fill: var(--logo-fill, #ff6600); stroke: var(--logo-stroke, #2c5eca); stroke-width:2;"/>
    <use xlink:href="#path1" transform="matrix(-1,0,0,1,265,0)"
         style="fill: var(--logo-fill, #ff6600); stroke: var(--logo-stroke, #2c5eca); stroke-width:2;"/>
<text x="110" y="55%" text-anchor="middle" dominant-baseline="middle"
      style="fill: var(--logo-text, #ff6600); font-family: verdana; font-size: 50px; letter-spacing: 2px;">
    Titre
</text>
  </g>
</svg>